openapi: 3.0.3

info:
  title: Auth Service API
  description: API del microservicio de autenticacion de TiendaTech. Permite registrar usuarios, iniciar sesion y validar tokens JWT.
  version: 1.0.0

servers:
  - url: http://localhost:8080/api/auth
    description: API Gateway local con Nginx
  - url: http://localhost:8001/auth
    description: Servicio auth directo

tags:
  - name: Auth
    description: Endpoints de autenticacion y validacion JWT

paths:
  /register:
    post:
      summary: Registrar usuario
      description: Registra un nuevo usuario en el sistema y retorna un token JWT.
      tags:
        - Auth
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/RegisterRequest'
            example:
              nombre: Jeremy Gaibor
              email: jeremy@tiendatech.com
              password: "1234"
              rol: ADMIN
      responses:
        "200":
          description: Usuario registrado correctamente
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/LoginResponse'
              example:
                status: success
                message: Usuario registrado correctamente
                token: eyJhbGciOiJIUzI1NiJ9...
        "400":
          description: Datos invalidos
        "500":
          description: Error interno del servidor

  /login:
    post:
      summary: Iniciar sesion
      description: Valida las credenciales del usuario y devuelve un token JWT.
      tags:
        - Auth
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/LoginRequest'
            example:
              email: admin@tiendatech.com
              password: "1234"
      responses:
        "200":
          description: Login correcto
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/LoginResponse'
              example:
                status: success
                message: Login correcto
                token: eyJhbGciOiJIUzI1NiJ9...
        "400":
          description: Datos invalidos
        "500":
          description: Error interno del servidor

  /validate:
    get:
      summary: Validar token JWT
      description: Verifica si el token JWT enviado en el header Authorization es valido.
      tags:
        - Auth
      security:
        - bearerAuth: []
      responses:
        "200":
          description: Resultado de validacion del token
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ValidateResponse'
              example:
                status: success
                valid: true
        "401":
          description: Token no autorizado o invalido
        "500":
          description: Error interno del servidor

components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT

  schemas:
    RegisterRequest:
      type: object
      required:
        - nombre
        - email
        - password
        - rol
      properties:
        nombre:
          type: string
          example: Jeremy Gaibor
        email:
          type: string
          format: email
          example: jeremy@tiendatech.com
        password:
          type: string
          example: "1234"
        rol:
          type: string
          example: ADMIN

    LoginRequest:
      type: object
      required:
        - email
        - password
      properties:
        email:
          type: string
          format: email
          example: admin@tiendatech.com
        password:
          type: string
          example: "1234"

    LoginResponse:
      type: object
      properties:
        status:
          type: string
          example: success
        message:
          type: string
          example: Login correcto
        token:
          type: string
          example: eyJhbGciOiJIUzI1NiJ9...

    ValidateResponse:
      type: object
      properties:
        status:
          type: string
          example: success
        valid:
          type: boolean
          example: true
